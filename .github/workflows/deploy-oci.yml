# Deploy to Oracle Cloud when main is updated.
#
# FIRST TIME: run scripts/bootstrap-oci.sh on the VM (Oracle Console SSH):
#   curl -fsSL https://raw.githubusercontent.com/Shreyash7798/CareerCopilotAI/main/scripts/bootstrap-oci.sh | bash
#
# Then add GitHub secrets printed by bootstrap: OCI_HOST, OCI_USER, OCI_SSH_KEY
#
# Manual re-deploy: Actions → Deploy to OCI → Run workflow

name: Deploy to OCI

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-oci
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Oracle Cloud
        env:
          OCI_HOST: ${{ secrets.OCI_HOST }}
          OCI_USER: ${{ secrets.OCI_USER }}
          OCI_SSH_KEY: ${{ secrets.OCI_SSH_KEY }}
          DEPLOY_HOOK_URL: ${{ secrets.DEPLOY_HOOK_URL }}
          DEPLOY_HOOK_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          set -euo pipefail
          APP_DIR="/home/ubuntu/CareerCopilotAI"
          BOOTSTRAP="cd ~/CareerCopilotAI && git fetch origin main && git reset --hard origin/main && bash scripts/bootstrap-oci.sh"

          if [ -n "${OCI_HOST}" ] && [ -n "${OCI_USER}" ] && [ -n "${OCI_SSH_KEY}" ]; then
            echo "Deploying via SSH to ${OCI_USER}@${OCI_HOST}"
            mkdir -p ~/.ssh
            printf '%s\n' "${OCI_SSH_KEY}" | tr -d '\r' > ~/.ssh/deploy_key
            chmod 600 ~/.ssh/deploy_key
            if ! ssh-keygen -y -f ~/.ssh/deploy_key >/dev/null 2>&1; then
              echo "::error::OCI_SSH_KEY secret is invalid. On the VM run: cat ~/.ssh/github_actions_deploy"
              echo "::error::Re-add the full private key (BEGIN/END lines) at GitHub → Settings → Secrets → OCI_SSH_KEY"
              exit 1
            fi
            ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o BatchMode=yes \
              "${OCI_USER}@${OCI_HOST}" bash -s <<SCRIPT
          set -euo pipefail
          cd ${APP_DIR}
          git fetch origin main
          git reset --hard origin/main
          chmod +x scripts/*.sh
          bash scripts/install-playwright-deps.sh
          bash scripts/deploy.sh
          curl -fsS http://127.0.0.1:8000/api/version
          SCRIPT
            exit 0
          fi

          if [ -n "${DEPLOY_HOOK_URL}" ] && [ -n "${DEPLOY_HOOK_TOKEN}" ]; then
            echo "Deploying via HTTP hook"
            curl -fsS -X POST "${DEPLOY_HOOK_URL}" \
              -H "Authorization: Bearer ${DEPLOY_HOOK_TOKEN}"
            exit 0
          fi

          echo "::notice::Deploy skipped — no GitHub deploy secrets configured."
          echo "::notice::The VM still auto-updates via cron (every 5 min) if bootstrap ran."
          echo "::notice::To enable this workflow, on the VM run:"
          echo "::notice::  bash ~/CareerCopilotAI/scripts/print-github-secrets.sh"
          echo "::notice::Then add OCI_HOST, OCI_USER, OCI_SSH_KEY to repo Secrets → Actions."
          echo "::notice::Or use HTTP hook: DEPLOY_HOOK_URL + DEPLOY_TOKEN (see docs/OCI-DEPLOY.md)."
          echo "::notice::First-time bootstrap (Oracle Console SSH):"
          echo "::notice::  ${BOOTSTRAP}"
          exit 0
