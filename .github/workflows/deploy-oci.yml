# Deploy to Oracle Cloud when main is updated.
#
# FIRST TIME: run scripts/bootstrap-oci.sh on the VM (Oracle Console SSH):
#   curl -fsSL https://raw.githubusercontent.com/Shreyash7798/CareerCopilotAI/main/scripts/bootstrap-oci.sh | bash
#
# Then add GitHub secrets printed by bootstrap: OCI_HOST, OCI_USER, OCI_SSH_KEY
#
# Manual re-deploy: Actions → Deploy to OCI → Run workflow

name: Deploy to OCI

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-oci
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Oracle Cloud
        env:
          OCI_HOST: ${{ secrets.OCI_HOST }}
          OCI_USER: ${{ secrets.OCI_USER }}
          OCI_SSH_KEY: ${{ secrets.OCI_SSH_KEY }}
          DEPLOY_HOOK_URL: ${{ secrets.DEPLOY_HOOK_URL }}
          DEPLOY_HOOK_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          set -euo pipefail
          APP_DIR="/home/ubuntu/CareerCopilotAI"
          BOOTSTRAP="curl -fsSL https://raw.githubusercontent.com/Shreyash7798/CareerCopilotAI/main/scripts/bootstrap-oci.sh | bash"

          if [ -n "${OCI_HOST}" ] && [ -n "${OCI_USER}" ] && [ -n "${OCI_SSH_KEY}" ]; then
            echo "Deploying via SSH to ${OCI_USER}@${OCI_HOST}"
            mkdir -p ~/.ssh
            printf '%s\n' "$OCI_SSH_KEY" > ~/.ssh/deploy_key
            chmod 600 ~/.ssh/deploy_key
            ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o BatchMode=yes \
              "${OCI_USER}@${OCI_HOST}" bash -s <<SCRIPT
          set -euo pipefail
          cd ${APP_DIR}
          git fetch origin main
          git reset --hard origin/main
          chmod +x scripts/deploy.sh
          ./scripts/deploy.sh
          curl -fsS http://127.0.0.1:8000/api/version
          SCRIPT
            exit 0
          fi

          if [ -n "${DEPLOY_HOOK_URL}" ] && [ -n "${DEPLOY_HOOK_TOKEN}" ]; then
            echo "Deploying via HTTP hook"
            curl -fsS -X POST "${DEPLOY_HOOK_URL}" \
              -H "Authorization: Bearer ${DEPLOY_HOOK_TOKEN}"
            exit 0
          fi

          echo "::warning::No OCI deploy credentials configured."
          echo "::warning::Run this ONCE in Oracle Cloud Console SSH:"
          echo "::warning::  ${BOOTSTRAP}"
          echo "::warning::Then add the printed secrets to GitHub Actions."
          exit 1
