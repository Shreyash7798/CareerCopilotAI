# CareerCopilot AI configuration.
#
# Copy this file to config/settings.yaml and adjust it for yourself.
# Nothing about the user is hardcoded in the application: this file (plus the
# CV you upload from the dashboard) is the single source of personalization.

app:
  # Where the SQLite database, exports and generated resumes live.
  data_dir: data
  database_url: sqlite:///data/careercopilot.db
  host: 0.0.0.0
  port: 8000
  # Base URL used in notification links (set to your LAN/host address).
  base_url: http://localhost:8000
  # Production example: http://161.118.184.228 — see docs/PRODUCTION-CHECKLIST.md
  # Set a password to require login (strongly recommended when the dashboard
  # is reachable from the internet). Empty = no login (local-first default).
  auth_password: ""
  # Shared secret for POST /api/deploy/hook (GitHub Actions can deploy without SSH).
  # Generate: python3 -c "import secrets; print(secrets.token_urlsafe(32))"
  deploy_token: ""

pipeline:
  # Per-company timeout (seconds). Stops one slow JS careers page from blocking
  # the whole discovery run on a small cloud VM.
  source_timeout_seconds: 120
  # Cap companies polled per cycle so a restart cannot hammer all 69 at once.
  max_sources_per_run: 25

scheduler:
  enabled: true
  # How often the discovery pipeline runs (minutes).
  discovery_interval_minutes: 60
  # Time of day (24h) for the daily summary notification.
  daily_summary_time: "08:30"
  # IANA timezone for the daily summary (cloud servers usually run UTC).
  # Example: Asia/Kolkata. Leave empty to use the server's local time.
  timezone: ""

bootstrap:
  # On startup: load starter companies when none are enabled, add Accenture India,
  # backfill Mumbai/Pune from job titles, rescore, and run discovery when needed.
  enabled: true
  starter_pack_on_first_run: true
  ensure_accenture: true
  backfill_locations_on_startup: true
  run_discovery_on_startup: true
  # Wait before the first discovery after a deploy/restart so the dashboard loads.
  discovery_startup_delay_seconds: 180

profile:
  # This block is auto-populated when you upload a CV, but you can edit it
  # freely. It is the input to match scoring.
  full_name: ""
  email: ""
  phone: ""
  current_employer: PwC India
  previous_employers:
    - Knest Manufacturers LLP
  experience_years: 3
  preferred_locations:
    - Mumbai
    - Pune
  # Also acceptable (scored lower than preferred):
  acceptable_locations:
    - Remote
    - Bengaluru
  preferred_domains:
    - Global Business Consulting
    # Also add for civil / infrastructure background, e.g.:
    # - Civil Engineering
    # - Infrastructure & EPC
  interests:
    - Business Transformation
    - Operations Consulting
    - Manufacturing Consulting
    - Supply Chain Consulting
    - Strategy Consulting
  skills:
    - Business Transformation
    - Operations
    - Supply Chain
    - Strategy
    - Process Improvement
    - Stakeholder Management
    - Project Management
    - Data Analysis
    - Excel
    - PowerPoint
  # Companies you would prioritize (boosts score) or avoid (zeroes the
  # company component).
  preferred_companies:
    - McKinsey
    - BCG
    - Bain
    - Deloitte
    - EY
    - KPMG
    - Accenture
    - Kearney
  avoided_companies: []

scoring:
  # Weights must be positive; they are normalized automatically.
  weights:
    role_fit: 0.30
    location_fit: 0.20
    experience_fit: 0.15
    industry_fit: 0.10
    skills_fit: 0.15
    company_fit: 0.10
  # Jobs scoring at or above this (0-100) are "high priority" and trigger
  # instant notifications.
  high_priority_threshold: 70
  role_keywords:
    - consultant
    - consulting
    - strategy
    - transformation
    - operations
    - supply chain
    - advisory
    - manager
  negative_role_keywords:
    - intern
    - director
    - partner
    - vice president

job_visibility:
  # Hide untracked jobs removed from company boards or older than these limits.
  hide_stale_untracked: true
  # When the source provides a posting date (Greenhouse, Lever, Accenture, …).
  max_posted_age_days: 60
  # Fallback when no posting date (e.g. careers_page scrapes).
  max_discovered_age_days: 90

linkedin:
  # Defaults for linkedin ats_type monitors (overridden per company in ats_config).
  f_TPR: r604800          # past week (r86400=24h, r2592000=month)
  max_pages: 5
  detail_limit: 20

# Optional Crawl4AI sidecar for JS-heavy careers pages (see docs/CRAWL4AI.md).
# Disabled by default — existing careers_page + Playwright behaviour is unchanged.
crawl4ai:
  enabled: false
  base_url: http://127.0.0.1:11235
  timeout_seconds: 90
  delay_before_return_html: 2.0
  page_timeout_ms: 60000
  # When enabled, careers_page with render:true uses Crawl4AI instead of local Playwright.
  prefer_over_playwright: true
  # If Playwright fails, try Crawl4AI before giving up.
  fallback_on_playwright_failure: true

notifications:
  # Send a short check-in message after every scheduled discovery run, even
  # when nothing new was found (heartbeat so you know the system is alive).
  run_summary: true
  # Also send the check-in by email (Telegram only by default).
  run_summary_email: false
  # Daily reminder for application follow-ups that are due or overdue.
  followup_reminders: true
  telegram:
    enabled: false
    # Create a bot with @BotFather, then set the token and your chat id.
    bot_token: ""
    chat_id: ""
  email:
    enabled: false
    smtp_host: smtp.gmail.com
    smtp_port: 587
    username: ""
    # For Gmail use an app password, never your real password.
    password: ""
    from_address: ""
    to_address: ""

exports:
  excel:
    enabled: true
    path: data/careercopilot.xlsx
  google_sheets:
    # Optional; requires a service-account JSON and sharing the spreadsheet
    # with that service account email. Left disabled by default to keep the
    # zero-cost, local-first promise. Sync runs after every pipeline cycle
    # when enabled (same four tabs as the Excel export).
    enabled: false
    credentials_file: config/google-service-account.json
    spreadsheet_id: ""
