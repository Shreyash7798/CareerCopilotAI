# Company catalog: curated, pre-verified companies users can add to their
# monitored list with one click from the dashboard (Companies -> catalog).
#
# Every entry was verified against the live endpoint (API returns jobs / page
# returns job links). Entries with `caveat` may not work from datacenter IPs
# (bot protection) but often work from residential connections — they are
# added disabled so users can test them with the Test Connection button.
#
# This file is data, not user config: it ships with the app and is safe to
# extend via pull requests.

sectors:
  - name: Consulting & Advisory
    companies:
      - name: PwC
        ats_type: workday
        country: Global
        ats_config:
          host: pwc.wd3.myworkdayjobs.com
          tenant: pwc
          site: Global_Experienced_Careers
          search_text: consulting
      - name: Deloitte India
        ats_type: sap
        country: India
        career_url: "https://southasiacareers.deloitte.com/search/?q=consulting"
