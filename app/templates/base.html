<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>{% block title %}CareerCopilot AI{% endblock %}</title>
  <link rel="manifest" href="/static/manifest.json">
  <link rel="apple-touch-icon" href="/static/icon-192.png">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">Career<span>Copilot</span></a>
    <form method="post" action="/api/pipeline/run" class="inline-form" onsubmit="return runPipeline(event)">
      <button class="btn btn-accent" type="submit" id="run-btn">Run discovery</button>
    </form>
  </header>
  <nav class="mainnav">
    <a href="/" class="{{ 'on' if active == 'dashboard' }}">Dashboard</a>
    <a href="/jobs" class="{{ 'on' if active == 'jobs' }}">Jobs</a>
    <a href="/applications" class="{{ 'on' if active == 'applications' }}">Tracker</a>
    <a href="/companies" class="{{ 'on' if active == 'companies' }}">Companies</a>
    {% if is_admin|default(false) %}
    <a href="/analytics" class="{{ 'on' if active == 'analytics' }}">Analytics</a>
    <a href="/recruiters" class="{{ 'on' if active == 'recruiters' }}">Recruiters</a>
    <a href="/activity" class="{{ 'on' if active == 'activity' }}">Activity</a>
    <a href="/admin/users" class="{{ 'on' if active == 'admin' }}">Users</a>
    <a href="/admin/status" class="{{ 'on' if active == 'status' }}">Status</a>
    {% endif %}
    <a href="/profile" class="{{ 'on' if active == 'profile' }}">Profile</a>
    <a href="/settings" class="{{ 'on' if active == 'settings' }}">Settings</a>
    <a href="/help" class="{{ 'on' if active == 'help' }}">Help</a>
  </nav>
  <main class="content">
    {% block content %}{% endblock %}
  </main>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <footer class="footer">
    CareerCopilot AI ·
    <a href="/help">Help</a> ·
    <a href="/api/exports/excel/download">My Excel</a> ·
    <span class="muted small" id="build-rev"></span>
    <form class="inline-form" method="post" action="/logout"><button class="btn btn-sm" type="submit" style="border:none;background:none;color:var(--muted);cursor:pointer">Sign out</button></form>
  </footer>
  <script>
    const DISCOVERY_COOLDOWN_MS = 15 * 60 * 1000;

    function showToast(message, kind = 'info', ms = 5000) {
      const el = document.getElementById('toast');
      if (!el) return;
      el.textContent = message;
      el.className = 'toast show ' + kind;
      clearTimeout(el._timer);
      el._timer = setTimeout(() => { el.className = 'toast'; }, ms);
    }

    function discoveryCooldownRemaining() {
      const last = Number(sessionStorage.getItem('cc_discovery_triggered') || 0);
      if (!last) return 0;
      return Math.max(0, DISCOVERY_COOLDOWN_MS - (Date.now() - last));
    }

    async function runPipeline(event) {
      event.preventDefault();
      const btn = document.getElementById('run-btn');
      const remaining = discoveryCooldownRemaining();
      if (remaining > 0) {
        const mins = Math.ceil(remaining / 60000);
        showToast(
          `Discovery already ran recently. Auto-runs every 3 hours — check back in ~${mins} min.`,
          'warn',
          6000
        );
        return false;
      }
      btn.disabled = true;
      btn.textContent = 'Starting…';
      try {
        const res = await fetch('/api/pipeline/run', {method: 'POST'});
        const data = await res.json();
        if (data.status === 'skipped') {
          showToast(data.message || 'Discovery already running.', 'warn', 6000);
          return false;
        }
        if (!res.ok) throw new Error(data.detail || 'Request failed');
        sessionStorage.setItem('cc_discovery_triggered', String(Date.now()));
        showToast('Discovery started. New jobs usually appear in 2–5 minutes.', 'info', 7000);
        btn.textContent = 'Running…';
        setTimeout(() => {
          btn.disabled = false;
          btn.textContent = 'Run discovery';
        }, 60000);
        return false;
      } catch (err) {
        showToast('Discovery failed: ' + err.message, 'err', 7000);
        btn.disabled = false;
        btn.textContent = 'Run discovery';
      }
      return false;
    }
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/static/sw.js');
    }
    fetch('/api/version').then(r => r.json()).then(d => {
      const el = document.getElementById('build-rev');
      if (el && d.revision) el.textContent = 'build ' + d.revision;
    }).catch(() => {});
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
