<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>Sign in · CareerCopilot AI</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="topbar">
    <span class="brand">Career<span>Copilot</span></span>
  </header>
  <main class="content" style="max-width: 420px;">
    <div class="card" style="margin-top: 10vh;">
      <h1>Sign in</h1>
      {% if error %}<p class="small" style="color: var(--bad);">{{ error }}</p>{% endif %}
      <form method="post" action="/login">
        <input type="hidden" name="next" value="{{ next_path }}">
        <label class="f">Password
          <input type="password" name="password" autofocus required autocomplete="current-password">
        </label>
        <button class="btn btn-accent" type="submit">Sign in</button>
      </form>
      <p class="small muted mt">Password is set in <code>config/settings.yaml</code> (<code>app.auth_password</code>) on the server.</p>
    </div>
  </main>
</body>
</html>
