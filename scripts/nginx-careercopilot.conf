# Nginx reverse proxy for CareerCopilot (optional).
# Proxies port 80 → app on 8000 with a longer timeout for discovery runs.
#
# Install on OCI:
#   sudo cp scripts/nginx-careercopilot.conf /etc/nginx/sites-available/careercopilot
#   sudo ln -sf /etc/nginx/sites-available/careercopilot /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
    }
}
