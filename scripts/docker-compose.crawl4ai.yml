# Crawl4AI sidecar for CareerCopilot AI
#
# Start alongside the app on a VM with enough RAM (2 GB+ recommended):
#   docker compose -f scripts/docker-compose.crawl4ai.yml up -d --build
#
# Then in config/settings.yaml:
#   crawl4ai:
#     enabled: true
#     base_url: http://127.0.0.1:11235

services:
  crawl4ai:
    build:
      context: .
      dockerfile: Dockerfile.crawl4ai
    image: careercopilot-crawl4ai:0.8.6
    container_name: careercopilot-crawl4ai
    restart: unless-stopped
    ports:
      - "127.0.0.1:11235:11235"
    shm_size: "1gb"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11235/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
